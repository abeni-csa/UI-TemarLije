name: ui_temarlije
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  flutter_svg: ^2.2.4
  fl_chart: ^1.2.0
  dio: ^5.9.2
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  material_symbols_icons: ^4.2928.0
  flutter_card_swiper: ^7.2.0
  cached_network_image: ^3.4.1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  auto_size_text: ^3.0.0
  pluto_grid: ^8.1.0
  intl: ^0.20.2
  uuid: ^4.5.3
  sqflite: ^2.4.2+1
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.0+3
  navigation_rail_flutter: ^1.0.3
  data_table_2: ^2.7.2
  window_manager: ^0.5.1
  get: ^4.7.3
  lottie: ^3.3.3
  shimmer: ^3.0.0
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  flutter_dropzone: ^4.2.1
  flutter_typeahead: ^6.0.0
  connectivity_plus: ^7.1.1
  multi_select_flutter: ^4.1.3
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1
  web: ^1.1.1
  http: ^1.6.0
  html: ^0.15.6
  url_strategy: ^0.3.0
  universal_html: ^2.3.0
  iconsax: ^0.0.8
  get_storage: ^2.1.1
  go_router: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:

  #--------------- LOCAL ASSETS ------------------#
  assets:
    - assets/logos/
    - assets/images/content/
    - assets/images/animations/
    - assets/icons/payment_methods/

  #--------------- LOCAL FONTS ------------------#
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/urbanist/Urbanist-Light.ttf
          weight: 300
        - asset: assets/fonts/urbanist/Urbanist-Regular.ttf
          weight: 400
        - asset: assets/fonts/urbanist/Urbanist-Italic.ttf
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/urbanist/Urbanist-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/urbanist/Urbanist-Bold.ttf
          weight: 800  # An image asset can refer to one or more resolution-specific "variants", see
